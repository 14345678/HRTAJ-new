   {
    var bd, divName = '_js_layer_'+_createLayerNo;

function setSpeed(crp,angle){
  angle%=360;
  crp.angle=angle;
  if(angle>90 && angle<270) crp.image.src=document.all("PEN13").src;
  else                      crp.image.src=document.all("PEN18").src;
  var rad=angle*Math.PI/180;
  var speed =(crp.maxspeed-crp.minspeed)*Math.random()+crp.minspeed;
  crp.speedx= speed*Math.cos(rad);
  crp.speedy=-speed*Math.sin(rad);
}



function Creeper(div,angle,minspeed,maxspeed,img){
  this.div     =div;
  this.width   =getDivWidth (div);
  this.height  =getDivHeight(div);
  this.minspeed=minspeed;
  this.maxspeed=maxspeed;
  this.angle   =angle;
  this.image   =img;

  setSpeed(this,angle);
}

creepers = new Array();
cId = null;
wx1 = 0; wx2 = 0; wy1 = 0; wy2 = 0;
interval = 200;
marginx=20; marginy=5;
function creepManager(){
  wx1=getWinXOffset()+marginx; wx2=wx1+getWindowWidth() -marginx*2;
  wy1=getWinYOffset()+marginy; wy2=wy1+getWindowHeight()-marginy*2;
  for(var i=0; i<creepers.length; i++){
    var creeper=creepers[i];
    var div=creeper.div;
    moveDivBy(div,creeper.speedx,creeper.speedy);
    var x=getDivLeft(div),y=getDivTop(div);
    var calc=false;
    if(x<=wx1){
      if(y<=wy1){
        if(creeper.angle<=270){
          creeper.angle=60*Math.random()+300; calc=true;
        }
      } else if((y+creeper.height)>=wy2){
        if(creeper.angle>=90){
          creeper.angle=60*Math.random(); calc=true;
        }
      } else {
        if(creeper.angle>=90 && creeper.angle<=270){
          creeper.angle=120*Math.random()+300; calc=true;
        }
      }
    } else if((x+creeper.width)>=wx2){
      if(y<=wy1){
        if(creeper.angle<=180 || creeper.angle>=270){
          creeper.angle=60*Math.random()+180; calc=true;
        }
      } else if((y+creeper.height)>=wy2){
        if(creeper.angle<=90 || creeper.angle>=180){
          creeper.angle=60*Math.random()+120; calc=true;
        }
      } else {
        if(creeper.angle<=90 || creeper.angle>=270){
          creeper.angle=120*Math.random()+120; calc=true;
        }
      }
    } else {
      if(y<=wy1){
        if(creeper.angle<=180){
          creeper.angle=120*Math.random()+300;
          if(creeper.angle>360) creeper.angle+=180;
          calc=true;
        }
      } else if((y+creeper.height)>=wy2){
        if(creeper.angle>=180){
          creeper.angle=120*Math.random();
          if(creeper.angle>60) creeper.angle+=60;
          calc=true;
        }
      }
    }
    if(calc) setSpeed(creeper,creeper.angle);
  }
  cId=setTimeout('creepManager()',interval);
}
_kintoNo=0;
function createCreeper(x,y,w,h,min,max,chr){
  var div=createLayer(x,y,w,h);
  var dir=360*Math.random();
  var dimg='kintoar';
  if(dir>90 && dir<270) dimg='kintoal';
  _kintoNo++;
  var nm='kinto'+_kintoNo;
  writeDivHTML(div,true,true,'<img name="kinto'+_kintoNo+'" src="'+dimg+'" alt="'+chr+'" >');
  return new Creeper(div,dir,min,max,getDivImage(div,nm));
}
function init(){
  
  ww = getWindowWidth(); wh =getWindowHeight();
  wx1=getWinXOffset(); wx2=wx1+ww;
  wy1=getWinYOffset(); wy2=wy1+wh;
  var x=ww/2, y=wh/2;
  creepers[creepers.length]=createCreeper(400,400,10,44,2,10,'');
  creepers[creepers.length]=createCreeper(100,200,50,94,2,10,'');
  creepers[creepers.length]=createCreeper(300,70,100,94,2,10,'');
  creepers[creepers.length]=createCreeper(400,100,150,94,2,10,'');
  creepers[creepers.length]=createCreeper(500,300,200,94,2,10,'');
  creepers[creepers.length]=createCreeper(150,400,70,94,2,10,'');
 


  for(var i=0; i<creepers.length; i++) setDivVisibility(creepers[i].div,true);
  cId=setTimeout('creepManager()',interval);
}

      if (et[posEndY] != -32767) ob.posEndY = et[posEndY];
