<!-- Begin
var no = 10; 
var speed = 30; 
snow = new Array();
snow[0] =document.all("img0").src; 
snow[1] =document.all("img1").src; 
snow[2] =document.all("img2").src; 
snow[3] =document.all("img3").src; 
snow[4] =document.all("img4").src;
snow[5] =document.all("img5").src;
snow[6] =document.all("img6").src;
snow[7] =document.all("img7").src;
snow[8] =document.all("img8").src;
snow[9] =document.all("img9").src;

var maxsize = 160;   

//var maxsnow = snow.length-1;  
var ns4up = (document.layers) ? 1 : 0;  // browser sniffer
var ie4up = (document.all) ? 1 : 0;
var dx, xp, yp;    // coordinate and position variables
var am, stx, sty;  // amplitude and step variables
var i, doc_width, doc_height;

if (ns4up) {
        doc_width = self.innerWidth;
        doc_height = self.innerHeight;
} else if (ie4up) {
        doc_width = document.body.clientWidth;
        doc_height = document.body.clientHeight;
}

dx = new Array();
xp = new Array();
yp = new Array();
am = new Array();
stx = new Array();
sty = new Array();
var j = 0;

for (i = 0; i < no; ++ i) {
        dx[i] = 0;                        // set coordinate variables
        am[i] = 200 + Math.random()*1;         // set amplitude variables
        xp[i] = am[i]/2+Math.random()*(doc_height-maxsize-am[i]);  // set position variables
        yp[i] = Math.random()*(doc_width-maxsize);
        stx[i] = 0.02 + Math.random()/100; // set step variables
        sty[i] = 5 + Math.random()*3;     // set step variables

        if (ns4up) {                      // set layers
                if (i == 0) {
                        document.write("<layer name=\"dot"+ i +"\" left=\"15\" top=\"15\" visibility=\"show\"><img src=\"" + snow[j] + "\" border=\"0\"></layer>");
                } else {
                        document.write("<layer name=\"dot"+ i +"\" left=\"15\" top=\"15\" visibility=\"show\"><img src=\"" + snow[j] + "\" border=\"0\"></layer>");
                }
        } else if (ie4up) {
                if (i == 0) {
                        document.write("<div id=\"dot"+ i +"\" style=\"POSITION: absolute; Z-INDEX: "+ i +"; VISIBILITY: visible; TOP: 15px; LEFT: 15px; width:1;\"><img src=\"" + snow[j] + "\" border=\"0\"></div>");
                } else {
                        document.write("<div id=\"dot"+ i +"\" style=\"POSITION: absolute; Z-INDEX: "+ i +"; VISIBILITY: visible; TOP: 15px; LEFT: 15px; width:1;\"><img src=\"" + snow[j] + "\" border=\"0\"></div>");
                }
        }
        if (j == (snow.length-1)) { j = 0; } else { j += 1; }
}

document.write("<div id=\"damy\" style=\"POSITION: absolute; width:1; Z-INDEX: "+ i +"; VISIBILITY: visible; TOP: 15px; LEFT: " + (doc_width+maxsize) + "px;\">&nbsp;</div>");


function snowNS() {  // Netscape main animation function
        for (i = 0; i < no; ++ i) {  // iterate for every dot
                if (i%2) {
                        yp[i] += sty[i];
                        if (yp[i] > doc_width) {
                                xp[i] = am[i]/2+ Math.random()*(doc_height-am[i]-maxsize);
                                yp[i] = 0-maxsize;
                                stx[i] = 0.02 + Math.random()/100;
                                sty[i] = 5 + Math.random()*3;
                                doc_width = self.innerWidth;
                                doc_height = self.innerHeight;
                        }
                } else {
                        yp[i] -= sty[i];
                        if (yp[i] < -maxsize) {
                                xp[i] = am[i]/2+Math.random()*(doc_height-am[i]-maxsize);
                                yp[i] = doc_width;
                                stx[i] = 0.02 + Math.random()/100;
                                sty[i] = 5 + Math.random()*3;
                                doc_width = self.innerWidth;
                                doc_height = self.innerHeight;
                        }
                }
                x = xp[i] + am[i]*Math.sin(dx[i]);
                if (x < 20) x = 20;
                if (x > doc_height-maxsize) x=doc_height-maxsize;
                dx[i] += stx[i];
                document.layers["dot"+i].top = x+pageYOffset;
                document.layers["dot"+i].left = yp[i]+pageXOffset;
        }
        setTimeout("snowNS()", speed);
}

function snowIE() {  // IE main animation function
        for (i = 0; i < no; ++ i) {  // iterate for every dot
                if (i%2) {
                        yp[i] += sty[i];
                        if (yp[i] > doc_width) {
                                xp[i] = am[i]/2+Math.random()*(doc_height-am[i]-maxsize);
                                yp[i] = 0-maxsize;
                                stx[i] = 0.02 + Math.random()/100;
                                sty[i] = 5 + Math.random()*3;
                                doc_width = document.body.clientWidth;
                                doc_height = document.body.clientHeight;
                        }
                } else {
                        yp[i] -= sty[i];
                        if (yp[i] < -maxsize) {
                                xp[i] = am[i]/2+Math.random()*(doc_height-am[i]-maxsize);
                                yp[i] = doc_width;
                                stx[i] = 0.02 + Math.random()/100;
                                sty[i] = 5 + Math.random()*3;
                                doc_width = document.body.clientWidth;
                                doc_height = document.body.clientHeight;
                        }
                }
                x = xp[i] + am[i]*Math.sin(dx[i]);
                if (x < 20) x = 20;
                if (x > doc_height-maxsize) x=doc_height-maxsize;
                dx[i] += stx[i];
                document.all["dot"+i].style.pixelTop = x+document.body.scrollTop;
                document.all["dot"+i].style.pixelLeft = yp[i]+document.body.scrollLeft;
        }
        setTimeout("snowIE()", speed);
}

if (ns4up) {
        snowNS();
} else if (ie4up) {
        snowIE();
}

// End -->
